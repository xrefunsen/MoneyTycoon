    conveyor: RED_CONCRETE
    conveyor-side: NETHER_BRICKS
    sell: GILDED_BLACKSTONE
    accent: CRIMSON_PLANKS
    vip: false
  END:
    display-name: "&5The End"
    cost: 100000
    floor: END_STONE_BRICKS
    wall: PURPUR_BLOCK
    pillar: OBSIDIAN
    conveyor: PURPLE_CONCRETE
    conveyor-side: PURPUR_SLAB
    sell: END_STONE
    accent: PURPUR_PILLAR
    vip: false
  ROYAL:
    display-name: "&6&lVIP Royal"
