
performance:
  tick-interval: 2
  max-items-per-tycoon: 80
  pet-teleport-interval: 40
  ui-update-interval: 20
  particles: true

general:
  world: "moneytycoon_world"
  start-x: 0
  start-z: 0
  start-y: 100
  plot-size: 35
  plot-gap: 20
  grid-width: 10
  auto-save-interval: 5

island-types:
  COMPACT:
    display-name: "&7Compact Island"
    description: "&7Small 25x25 plot, efficient layout"
    plot-size: 25
    cost: 0
    dropper-x: 12
    dropper-z: 5
    conv-start-z: 8
    conv-end-z: 18
    sell-z: 19
    spawn-x: 12
    spawn-z: 22
    vip: false
  DEFAULT:
    display-name: "&aStandard Island"
    description: "&7Classic 35x35 plot"
    plot-size: 35
    cost: 0
    dropper-x: 17
    dropper-z: 5
    conv-start-z: 8
    conv-end-z: 22
    sell-z: 23
    spawn-x: 17
    spawn-z: 30
    vip: false
  LARGE:
    display-name: "&6Large Island"
    description: "&7Spacious 45x45 plot"
    plot-size: 45
    cost: 100000
    dropper-x: 22
    dropper-z: 5
    conv-start-z: 8
    conv-end-z: 32
    sell-z: 33
    spawn-x: 22
    spawn-z: 40
    vip: false
  PREMIUM:
    display-name: "&d&lVIP Premium Island"
    description: "&7Huge 55x55 plot"
    plot-size: 55
    cost: 500000
    dropper-x: 27
    dropper-z: 5
    conv-start-z: 8
    conv-end-z: 42
    sell-z: 43
    spawn-x: 27
    spawn-z: 50
    vip: true

database:
  type: SQLITE
  mysql:
    host: localhost
    port: 3306
    database: moneytycoon
    username: root
    password: ""

dropper:
  base-interval: 40
  speed-upgrade-reduction: 4
  types:
    COBBLESTONE:
      display-name: "&7Stone Dropper"
      value: 1.0
      cost: 0
      order: 1
    IRON_INGOT:
      display-name: "&fIron Dropper"
      value: 5.0
      cost: 2500
      order: 2
    GOLD_INGOT:
      display-name: "&6Gold Dropper"
      value: 25.0
      cost: 15000
      order: 3
    DIAMOND:
      display-name: "&bDiamond Dropper"
      value: 100.0
      cost: 75000
      order: 4
    EMERALD:
      display-name: "&aEmerald Dropper"
      value: 500.0
      cost: 350000
      order: 5
    NETHERITE_INGOT:
      display-name: "&4Netherite Dropper"
      value: 2500.0
      cost: 1500000
      order: 6
    DIAMOND_BLOCK:
      display-name: "&b&lVIP Diamond Block"
      value: 5000.0
      cost: 5000000
      order: 7
      vip: true
    NETHERITE_BLOCK:
      display-name: "&4&lVIP Netherite Block"
      value: 15000.0
      cost: 25000000
      order: 8
      vip: true

upgrades:
  dropper-speed:
    display-name: "&eDropper Speed"
    max-level: 10
    base-cost: 500
    cost-multiplier: 2.5
    description: "&7Increases dropper production speed"
  value-multiplier:
    display-name: "&6Value Multiplier"
    max-level: 10
    base-cost: 1000
    cost-multiplier: 3.0
    description: "&7Increases the value of produced items"
  conveyor-speed:
    display-name: "&cConveyor Speed"
    max-level: 5
    base-cost: 1500
    cost-multiplier: 2.0
    description: "&7Increases conveyor belt speed"
  auto-collect:
    display-name: "&aAuto Collect"
    max-level: 1
    base-cost: 50000
    cost-multiplier: 1.0
    description: "&7Sold money goes directly to your wallet"
  extra-dropper:
    display-name: "&dExtra Dropper"
    max-level: 3
    base-cost: 25000
    cost-multiplier: 4.0
    description: "&7Adds additional droppers (max 3)"
  processor:
    display-name: "&5Processor"
    max-level: 5
    base-cost: 40000
    cost-multiplier: 3.0
    description: "&7Processes items for +30% value per level"

prestige:
  enabled: true
  multiplier-per-prestige: 0.5
  base-cost: 500000
  cost-multiplier: 3.0

rebirth:
  enabled: true
  multiplier-per-rebirth: 1.0
  base-cost: 50000000
  cost-multiplier: 5.0
  prestige-requirement: 10

