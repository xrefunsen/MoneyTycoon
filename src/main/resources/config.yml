quests:
  daily:
    daily-sell-100:
      display-name: "&eDaily Seller"
      description: "&7Sell 100 items"
      type: SELL_ITEMS
      target: 100
      reward: 500
    daily-earn-1k:
      display-name: "&eDaily Earner"
      description: "&7Earn $1,000"
      type: EARN_MONEY
      target: 1000
      reward: 300
    daily-collect-5:
      display-name: "&eDaily Collector"
      description: "&7Collect money 5 times"
      type: COLLECT
      target: 5
      reward: 200
  weekly:
    weekly-sell-1k:
      display-name: "&6Weekly Seller"
      description: "&7Sell 1,000 items"
      type: SELL_ITEMS
      target: 1000
      reward: 5000
    weekly-earn-50k:
      display-name: "&6Weekly Earner"
