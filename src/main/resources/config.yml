    bonus-type: DOUBLE_DROP
    bonus-value: 0.10
    vip: false
  VIP_DRAGON:
    display-name: "&d&lVIP Bee"
    description: "&7All bonuses at 15%"
    cost: 0
    mob-type: BEE
    bonus-type: ALL_BONUS
    bonus-value: 0.15
    vip: true

boosters:
  2x:
    display-name: "&e2x Multiplier"
