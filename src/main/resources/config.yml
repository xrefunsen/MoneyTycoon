    lucky-token:
      display-name: "&6Lucky Token"
      description: "&7Guarantees double drop for 50 items"
      material: GOLD_NUGGET
      cost: 5000
      type: LUCKY_TOKEN
      value: 50
      vip: false
    instant-collect:
      display-name: "&aInstant Collect"
      description: "&7Instantly collects all your balance"
      material: EMERALD
      cost: 2000
      type: INSTANT_COLLECT
      vip: false
    mystery-box:
      display-name: "&d&lMystery Box"
      description: "&7Random pet or $5K-$20K money!"
      material: CHEST
      cost: 15000
      type: MYSTERY_BOX
      vip: false
    mega-booster:
      display-name: "&c&l10x MEGA Booster"
      description: "&710x multiplier for 30 seconds!"
      material: NETHER_STAR
      cost: 100000
