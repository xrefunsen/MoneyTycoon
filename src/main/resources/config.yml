daily-bonus:
  enabled: true
  rewards:
    1: 500
    2: 1000
    3: 2000
    4: 3500
    5: 5000
    6: 7500
    7: 15000
  max-streak: 7
  reset-if-missed: true

actionbar:
  enabled: true
  format: "&6Balance: &e$%balance% &7| &aWallet: &e$%wallet%"
  update-interval: 20
bossbar:
  enabled: true
  show-on-prestige-progress: true
  format: "&6Prestige Progress: &e$%current% &7/ &a$%target%"

purchasables:
  obsidian-chest:
    enabled: true
    cost: 100000
    description: "&7Chest becomes obsidian, money auto-collects"
    effect: AUTO_COLLECT
  golden-conveyor:
    enabled: true
    cost: 50000
    description: "&7+20% conveyor speed permanently"
    effect: CONVEYOR_BOOST
    value: 0.2
  value-boost:
    enabled: true
    cost: 75000
    description: "&7+10% item value permanently"
    effect: VALUE_BOOST
    value: 0.1

offline-earnings:
  enabled: true
  max-hours: 24
  rate-per-hour: 0.05
  min-interval-minutes: 5

achievements:
  first-1k:
    display-name: "&eFirst Thousand"
    description: "&7Earn $1,000 total"
    reward: 500
    condition: total_earned
    target: 1000
  first-100k:
    display-name: "&6Hundred K"
    description: "&7Earn $100,000 total"
    reward: 5000
    condition: total_earned
    target: 100000
  prestige-5:
    display-name: "&dPrestige Master"
    description: "&7Reach Prestige 5"
    reward: 25000
    condition: prestige
    target: 5
  rebirth-1:
    display-name: "&5Reborn"
    description: "&7Complete first Rebirth"
    reward: 100000
    condition: rebirth
    target: 1

logging:
  enabled: true
  log-prestige: true
  log-rebirth: true
  log-trades: true
  log-admin-actions: true
